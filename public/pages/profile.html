<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <title>CineRate - Profile</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
  <header>
    <h1>&#9733; CineRate</h1>
  </header>

  <main>
    <h2 id="Profile">Profile</h2>

    <div id="profile-actions">
      <h3 id="Profile">Welcome to CineRate!</h3>
      <p id="Profile">Please Sign Up or Log In to access your profile.</p>
      <div id="auth-toggle">
        <button id="signup-btn">Sign Up</button>
        <button id="login-btn">Log In</button>
      </div>

      <form id="auth-form" hidden>
        <input type="text" id="username" class="auth-input" placeholder="Username" autocomplete="username">
        <input type="password" id="password" class="auth-input" placeholder="Password" autocomplete="current-password">
        <button type="submit" id="auth-submit">Submit</button>
      </form>

      <p id="auth-message"></p>
    </div>

    <div id="profile-dashboard" hidden>
      <div id="profile-avatar"></div>
      <h3 id="profile-username"></h3>
      <p id="profile-subtitle">CineRate Member</p>
      <button id="logout-btn">Log Out</button>

      <div id="edit-profile-section">
        <h4>Edit Profile</h4>
        <form id="edit-form">
          <input type="text" id="new-username" class="auth-input" placeholder="New Username" autocomplete="username">
          <input type="password" id="new-password" class="auth-input" placeholder="New Password (optional)" autocomplete="new-password">
          <button type="submit" id="edit-submit">Save Changes</button>
        </form>
        <p id="edit-message"></p>
      </div>
    </div>
  </main>

  <nav>
    <a href="/"><i class="fa fa-home"></i> Home</a>
    <a href="/pages/search.html"><i class="fa fa-search"></i> Search</a>
    <a href="#"><i class="fa fa-star"></i> Ratings</a>
    <a href="#" id="nav-active"><i class="fa fa-user"></i> Profile</a>
  </nav>

  <script src="/js/profile.js"></script>
</body>
</html>
