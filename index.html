<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>CineRate</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="main.css">
</head>
<body>

  <header>
    <h1>&#9733; CineRate</h1>
  </header>

  <main>

    <input type="search" id="search" placeholder="Search movies...">

    <h2>Featured</h2>
    <div id="featured-card">
      <div id="featured-img"></div>
      <div id="featured-info">
        <h3>Movie Sample 1</h3>
        <p id="featured-meta">2024 &bull; Sci-Fi</p>
        <p id="stars">&#9733;&#9733;&#9733;&#9733;&#9734; <span>4.5</span></p>
        <button id="btn">Rate This</button>
      </div>
    </div>

    <h2>Recently Rated</h2>
    <div id="recently-rated-row">

      <div id="movie-card-1">
        <div id="poster-1"></div>
        <p>Movie Sample 2</p>
        <p class="meta">4.2 &#9733;</p>
      </div>

      <div id="movie-card-2">
        <div id="poster-2"></div>
        <p>Movie Sample 3</p>
        <p class="meta">3.8 &#9733;</p>
      </div>

      <div id="movie-card-3">
        <div id="poster-3"></div>
        <p>Movie Sample 4</p>
        <p class="meta">4.7 &#9733;</p>
      </div>

      <div id="movie-card-4">
        <div id="poster-4"></div>
        <p>Movie Sample 5</p>
        <p class="meta">4.0 &#9733;</p>
      </div>

    </div>

    <h2>Browse</h2>
    <div id="browse-list">
      <div id="browse-row"></div>
    </div>

  </main>

  <nav>
    <a href="#" id="nav-active">Home</a>
    <a href="search.html">Search</a>
    <a href="#">Ratings</a>
    <a href="#">Profile</a>
  </nav>

</body>
<script src="script.js"></script>
</html>
